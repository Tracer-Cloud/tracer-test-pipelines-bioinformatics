# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
    - nextflow@24.10.0
    - python@3.12
    - py-pip
  view: true
  concretizer:
    unify: when_possible
  packages:
    apple-clang:
      externals:
        - spec: apple-clang@16.0.0
          prefix: /usr
          extra_attributes:
            compilers:
              c: /usr/bin/clang
              cxx: /usr/bin/clang++
    llvm:
      externals:
        - spec: llvm@19.1.6+clang~flang~lld+lldb
          prefix: /opt/homebrew/opt/llvm
          extra_attributes:
            compilers:
              c: /opt/homebrew/opt/llvm/bin/clang
              cxx: /opt/homebrew/opt/llvm/bin/clang++
    gcc:
      externals:
        - spec: gcc@14.2.0 languages:='c,c++,fortran'
          prefix: /opt/homebrew
          extra_attributes:
            compilers:
              c: /opt/homebrew/bin/gcc-14
              cxx: /opt/homebrew/bin/g++-14
              fortran: /opt/homebrew/bin/gfortran
